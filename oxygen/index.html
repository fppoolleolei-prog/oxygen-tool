<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酸素ボンベ計算ツール</title>

<style>
body{
font-family:Arial;
margin:0;
padding:18px;
font-size:18px;
transition: background 0.5s;
}

.container{max-width:560px;margin:auto}
.card{
background:#fff;
border-radius:16px;
padding:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.08)
}
h1{font-size:24px;margin-bottom:14px}

/* モードを大きく */
#mode{font-size:20px;font-weight:bold}

label{display:block;margin-top:14px;font-weight:bold;font-size:18px;}

.inputRow{display:flex;align-items:center;gap:8px}
.inputRow input{flex:0.7}
.inputRow img{width:80px;height:auto}

input,select{width:100%;padding:14px;border-radius:10px;border:1px solid #ccc;margin-top:6px;font-size:18px;}

button{padding:16px;border:none;border-radius:14px;font-size:18px;}
.calc{background:#43a047;color:#fff;width:100%;margin-top:14px;font-size:20px;}
.quickBtns{display:flex;gap:10px;margin-top:12px;}
.quickBtns button{flex:1;background:#1976d2;color:#fff;font-weight:bold;padding:16px;}
.result{margin-top:16px;padding:16px;background:#f1f6ff;border-radius:12px;font-size:20px;}
.warn{color:#d64545;font-weight:bold}
.safe{color:#2e7d32;font-weight:bold}
.note{font-size:18px;color:#333;margin-top:8px;font-weight:bold}
.small{font-size:14px;font-weight:normal}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>酸素ボンベ計算ツール</h1>

<label>モード</label>
<select id="mode">
<option value="normal">通常酸素</option>
<option value="nppv">NPPV(バイパップ)</option>
<option value="vent">呼吸器</option>
</select>

<label>ボンベ圧 (MPa)</label>
<div class="inputRow">
<input id="pressure" type="number" placeholder="例: 10">
<img src="pressuregauge.png" alt="圧力計">
</div>


<div class="quickBtns">
<button type="button" onclick="setPressureAndCalc(14.7)">14.7MPa<br><span class="small">（満タン）</span></button>
<button type="button" onclick="setPressureAndCalc(10)">10MPa</button>
<button type="button" onclick="setPressureAndCalc(5)">5MPa</button>
</div>
<div class="note">＊酸素ボンベの満タンは14.7MPaです</div>

<div id="normalFields">
<label>流量 (L/min)</label>
<div class="inputRow">
<input id="flow" type="number" placeholder="例: 3">
<img src="flowmeter.png" alt="流量計">
</div>
</div>

<div id="nppvFields" style="display:none">
<label>FiO2 (%)</label>
<input id="fio2" type="number" placeholder="例: 60">

<label>分時換気量 (L/min)</label>
<input id="totalFlow" type="number" placeholder="例: 6">

<label>リーク量 (L/min)</label>
<input id="leak" type="number" placeholder="自動20">
</div>

<div id="ventFields" style="display:none">
<label>FiO2 (%)</label>
<input id="fio2_v" type="number" placeholder="例: 60">

<label>分時換気量 (L/min)</label>
<input id="mv_v" type="number" placeholder="例: 8">
</div>

<button type="button" class="calc" onclick="calc()">計算</button>

<div id="result" class="result"></div>

</div>
</div>

<script>
const CYLINDER_TOTAL = 500
const FULL_PRESSURE = 14.7
const SAFE = 2

const mode=document.getElementById("mode")

mode.addEventListener("change",()=>{
document.getElementById("normalFields").style.display = (mode.value==="normal")?"block":"none"
document.getElementById("nppvFields").style.display = (mode.value==="nppv")?"block":"none"
document.getElementById("ventFields").style.display = (mode.value==="vent")?"block":"none"
})

function setPressureAndCalc(value){
document.getElementById("pressure").value = value
calc()
}

function getFlow(){
if(mode.value==="normal"){
return parseFloat(document.getElementById("flow").value)
}
if(mode.value==="nppv"){
let fio2 = document.getElementById("fio2").value/100
let mv = parseFloat(document.getElementById("totalFlow").value)
let leakVal = document.getElementById("leak").value
let leak = leakVal === "" ? 20 : parseFloat(leakVal)
return (mv + leak) * ((fio2-0.21)/0.79)
}
if(mode.value==="vent"){
let fio2 = document.getElementById("fio2_v").value/100
let mv = parseFloat(document.getElementById("mv_v").value)
return Math.max(0, mv*((fio2-0.21)/0.79))
}
}

function calc(){
let p = parseFloat(document.getElementById("pressure").value)
let flow = getFlow()
if(!p || p<=SAFE){
alert("圧を確認してください")
return
}
if(!flow || flow<=0){
alert("設定を確認してください")
return
}

let usable = ((p - SAFE)/FULL_PRESSURE)*CYLINDER_TOTAL
let time = usable / flow

let msg=""
if(time < 10){ msg = "<div class='warn'>⚠ 危険（10分未満）</div>" }
else if(time < 20){ msg = "<div class='warn'>⚠ 注意（20分未満）</div>" }
else{ msg = "<div class='safe'>✔ 使用可能</div>" }

document.getElementById("result").innerHTML =
"<div style='font-size:32px;font-weight:bold'>残り "+Math.round(time)+" 分</div>"+
"<div>酸素消費 "+flow.toFixed(1)+" L/min</div><br>"+msg
}
</script>

</body>
</html>
